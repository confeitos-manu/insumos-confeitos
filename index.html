<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Insumos por foto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FBF6EE;
    --cocoa: #3B2A20;
    --caramel: #B8763E;
    --rose: #C97B85;
    --sage: #7C8B6F;
    --line: #DDD3C0;
    --danger: #B5544A;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); }
  body { font-family: 'Inter', sans-serif; color: var(--cocoa); min-height: 100vh; padding: 0 0 92px 0; position: relative; }

  .header { padding: 26px 20px 16px; border-bottom: 1px solid var(--line); }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .header h1 { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
  .header p { margin: 0; font-size: 13px; color: var(--caramel); font-weight: 500; }
  .btn-backup { flex-shrink: 0; background: #fff; border: 1px solid var(--line); border-radius: 20px; padding: 7px 12px; font-size: 11px; font-weight: 600; color: var(--cocoa); cursor: pointer; white-space: nowrap; margin-top: 2px; }

  .content { padding: 18px 20px; }

  .capture-zone { border: 1.5px dashed var(--caramel); border-radius: 14px; padding: 38px 20px; text-align: center; background: rgba(184,118,62,0.05); cursor: pointer; display: block; }
  .capture-zone .icon { font-size: 32px; display: block; margin-bottom: 10px; }
  .capture-zone h3 { font-family: 'Fraunces', serif; font-size: 17px; margin: 0 0 6px; }
  .capture-zone p { font-size: 13px; color: #7A6A5A; margin: 0; }

  .btn { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; border: none; border-radius: 10px; padding: 12px 16px; cursor: pointer; width: 100%; }
  .btn-primary { background: var(--cocoa); color: var(--paper); }
  .btn-primary:disabled { opacity: 0.5; }
  .btn-ghost { background: transparent; color: var(--cocoa); border: 1px solid var(--line); }
  .btn-danger-text { background: none; border: none; color: var(--danger); font-size: 12px; cursor: pointer; padding: 0; }
  .btn-link { background: none; border: none; color: var(--caramel); font-size: 12px; font-weight: 600; cursor: pointer; padding: 0; }
  .btn-link.strong { color: var(--cocoa); text-decoration: underline; }
  .btn-link-sm { background: none; border: none; color: var(--sage); font-size: 12px; font-weight: 600; cursor: pointer; padding: 0; }

  .processing { text-align: center; padding: 56px 20px; }
  .spinner { width: 30px; height: 30px; border: 3px solid var(--line); border-top-color: var(--caramel); border-radius: 50%; margin: 0 auto 14px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing p { font-size: 14px; color: #7A6A5A; }
  .preview-thumb { width: 100%; max-height: 130px; object-fit: cover; border-radius: 10px; margin-bottom: 14px; filter: sepia(8%); }

  .receipt { background: #fff; border-radius: 4px; box-shadow: 0 6px 20px rgba(59,42,32,0.08); }
  .receipt-edge { height: 8px; width: 100%; background: linear-gradient(135deg, #fff 50%, transparent 50%) 0 0 / 10px 10px, linear-gradient(-135deg, #fff 50%, transparent 50%) 0 0 / 10px 10px; background-repeat: repeat-x; background-color: var(--paper); }
  .receipt-inner { padding: 16px 16px 6px; }
  .receipt-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; gap: 10px; }
  .receipt-meta input { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; border: none; background: transparent; width: 60%; border-bottom: 1px dotted var(--line); padding-bottom: 2px; }
  .receipt-meta .date { font-family: 'Space Mono', monospace; font-size: 11px; color: #9A8A78; white-space: nowrap; }

  .item-row { display: grid; grid-template-columns: 20px 1fr; gap: 10px; padding: 9px 0; border-bottom: 1px dashed var(--line); align-items: start; }
  .item-row:last-child { border-bottom: none; }
  .item-row input[type=checkbox] { margin-top: 4px; accent-color: var(--sage); width: 16px; height: 16px; }
  .item-row.excluded { opacity: 0.4; }
  .item-fields { width: 100%; }
  .item-name { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; border: none; background: transparent; width: 100%; margin-bottom: 6px; border-bottom: 1px solid transparent; }
  .item-name:focus { border-bottom: 1px solid var(--caramel); outline: none; }
  .item-numbers { display: flex; gap: 8px; align-items: center; font-family: 'Space Mono', monospace; font-size: 12px; color: #7A6A5A; }
  .item-numbers input { font-family: 'Space Mono', monospace; font-size: 12px; border: 1px solid var(--line); border-radius: 5px; padding: 4px 6px; width: 54px; background: #FCFAF5; }
  .item-numbers .x { color: var(--line); }
  .item-numbers .total { margin-left: auto; font-weight: 700; color: var(--cocoa); }
  .receipt-total { display: flex; justify-content: space-between; padding: 12px 0 4px; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 15px; }
  .scissors-note { text-align: center; font-size: 11px; color: #B0A390; padding: 6px 0 14px; }
  .action-row { display: flex; gap: 10px; margin-top: 14px; }
  .error-box { background: rgba(181,84,74,0.08); border: 1px solid rgba(181,84,74,0.25); border-radius: 10px; padding: 16px; font-size: 13px; color: var(--danger); margin-bottom: 16px; }
  .empty-state { text-align: center; padding: 56px 20px; color: #9A8A78; }
  .empty-state .icon { font-size: 28px; display: block; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; margin: 0; }

  .summary-bar { display: flex; justify-content: space-between; align-items: baseline; padding: 2px 0 16px; }
  .summary-bar .label { font-size: 12px; color: #9A8A78; }
  .summary-bar .value { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 19px; color: var(--cocoa); }

  .nota-card { background: #fff; border-radius: 10px; box-shadow: 0 4px 14px rgba(59,42,32,0.06); padding: 14px 16px; margin-bottom: 12px; }
  .nota-card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .nota-card-head .loja { font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; }
  .nota-card-head .data { font-family: 'Space Mono', monospace; font-size: 11px; color: #9A8A78; }
  .nota-items { font-size: 12px; color: #7A6A5A; line-height: 1.7; }
  .nota-items .line { display: flex; justify-content: space-between; }
  .nota-items .price { font-family: 'Space Mono', monospace; }
  .nota-card-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); }
  .nota-total { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px; }

  .search-box { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--line); background: #fff; font-family: 'Inter', sans-serif; font-size: 14px; margin-bottom: 14px; }

  .merge-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; min-height: 20px; }
  .merge-hint { font-size: 12px; color: #9A8A78; }
  .merge-modal-backdrop { position: fixed; inset: 0; background: rgba(59,42,32,0.35); display: flex; align-items: flex-end; z-index: 20; }
  .merge-modal { background: #fff; border-radius: 14px 14px 0 0; padding: 20px; width: 100%; }
  .merge-modal h4 { font-family: 'Fraunces', serif; font-size: 16px; margin: 0 0 12px; }
  .merge-modal input { width: 100%; padding: 11px 12px; border-radius: 8px; border: 1px solid var(--line); font-family: 'Inter', sans-serif; font-size: 14px; margin-bottom: 4px; background: #FCFAF5; }

  .produto-card { background: #fff; border-radius: 10px; box-shadow: 0 4px 14px rgba(59,42,32,0.06); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; }
  .produto-card.selecionavel { border: 1.5px solid var(--line); }
  .produto-card.selecionado { border: 1.5px solid var(--sage); background: rgba(124,139,111,0.06); }
  .produto-checkbox { margin-right: 10px; accent-color: var(--sage); width: 17px; height: 17px; }
  .produto-head { display: flex; justify-content: space-between; align-items: center; }
  .produto-nome { font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; }
  .produto-meta { font-size: 11px; color: #9A8A78; margin-top: 2px; }
  .produto-precos { text-align: right; }
  .produto-precos .ultimo { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 15px; }
  .produto-precos .faixa { font-family: 'Space Mono', monospace; font-size: 11px; color: #9A8A78; }
  .produto-precos .faixa.alerta { color: var(--danger); font-weight: 700; }
  .produto-ocorrencias { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--line); font-size: 12px; }
  .produto-ocorrencias .line { display: flex; justify-content: space-between; padding: 4px 0; color: #7A6A5A; }
  .produto-ocorrencias .price { font-family: 'Space Mono', monospace; }
  .variantes-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .chip { display: inline-flex; align-items: center; gap: 5px; background: #F2EBDD; border-radius: 20px; padding: 4px 6px 4px 10px; font-size: 11px; color: #7A6A5A; }
  .chip button { background: none; border: none; color: #B0A390; font-size: 13px; cursor: pointer; padding: 0 3px; }

  .estoque-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .estoque-toolbar .alerta-parado { font-size: 12px; color: var(--danger); font-weight: 600; }

  .estoque-form { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 4px 14px rgba(59,42,32,0.06); }
  .form-title { font-family: 'Fraunces', serif; font-size: 15px; margin: 0 0 14px; }
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 11px; font-weight: 600; color: #9A8A78; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.03em; }
  .form-row input[type=text], .form-row input[type=number], .form-row select, .form-row textarea {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--line); font-family: 'Inter', sans-serif; font-size: 14px; background: #FCFAF5;
  }
  .form-row textarea { resize: vertical; min-height: 50px; }
  .form-row-split { display: flex; gap: 10px; }
  .form-row-split > div { flex: 1; }
  .photo-upload { border: 1.5px dashed var(--line); border-radius: 10px; text-align: center; padding: 14px; cursor: pointer; font-size: 12px; color: #9A8A78; display: block; }
  .photo-upload img { width: 100%; max-height: 130px; object-fit: cover; border-radius: 8px; }
  .photo-loading { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 10px 0; }
  .photo-loading .spinner { width: 22px; height: 22px; margin: 0; }
  .foto-erro { font-size: 11px; color: var(--danger); margin-top: 6px; line-height: 1.4; }
  .status-toggle { display: flex; gap: 8px; }
  .status-toggle button { flex: 1; padding: 9px; border-radius: 8px; border: 1px solid var(--line); background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
  .status-toggle button.active-girando { background: var(--sage); color: #fff; border-color: var(--sage); }
  .status-toggle button.active-parado { background: var(--danger); color: #fff; border-color: var(--danger); }
  .sugestao-preco { display: block; text-align: left; background: rgba(184,118,62,0.08); border: 1px dashed var(--caramel); border-radius: 8px; padding: 8px 10px; font-size: 11px; color: var(--caramel); margin-top: 6px; cursor: pointer; width: 100%; }
  .margem-preview { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--sage); margin-top: 6px; }

  .estoque-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .estoque-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 14px rgba(59,42,32,0.06); }
  .estoque-card .foto { width: 100%; height: 100px; object-fit: cover; background: var(--line); display: block; }
  .estoque-card .foto-placeholder { width: 100%; height: 100px; background: #F2EBDD; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #C9BCA6; }
  .estoque-card-body { padding: 10px 12px 12px; }
  .estoque-card .nome { font-family: 'Fraunces', serif; font-weight: 600; font-size: 13px; margin-bottom: 3px; line-height: 1.2; }
  .estoque-card .cat { font-size: 10px; color: var(--caramel); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
  .estoque-card .qtd { font-family: 'Space Mono', monospace; font-size: 11px; color: #7A6A5A; margin-top: 4px; }
  .preco-pago { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--caramel); font-weight: 700; margin-top: 3px; }
  .preco-pago-total { color: #9A8A78; font-weight: 400; }
  .preco-venda { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--sage); font-weight: 700; margin-top: 2px; }
  .margem { color: #9A8A78; font-weight: 400; }
  .badge-status { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 20px; margin-top: 6px; cursor: pointer; }
  .badge-girando { background: rgba(124,139,111,0.15); color: var(--sage); }
  .badge-parado { background: rgba(181,84,74,0.12); color: var(--danger); }
  .estoque-card-foot { display: flex; justify-content: space-between; padding: 0 12px 10px; }

  .fab { position: fixed; bottom: 78px; right: 18px; background: var(--cocoa); color: var(--paper); border: none; border-radius: 50%; width: 52px; height: 52px; font-size: 22px; box-shadow: 0 6px 16px rgba(59,42,32,0.3); cursor: pointer; z-index: 5; }

  .tabbar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #fff; border-top: 1px solid var(--line); padding: 7px 6px calc(7px + env(safe-area-inset-bottom)); }
  .tabbar button { flex: 1; background: none; border: none; font-family: 'Inter', sans-serif; font-size: 10.5px; font-weight: 600; color: #B0A390; padding: 6px 2px; cursor: pointer; }
  .tabbar button.active { color: var(--cocoa); }

  .toast { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); background: var(--cocoa); color: var(--paper); padding: 10px 18px; border-radius: 20px; font-size: 12px; z-index: 50; box-shadow: 0 6px 16px rgba(0,0,0,0.2); }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://qqihummxrmsndpqzvduh.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_z_K62mgmqtJAQjFWWTrkDg__kO5cdJG";
    const BUCKET = "Insumos";
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const CATEGORIAS = ["Ingrediente", "Embalagem", "Flor", "Produto pronto", "Outro"];

    // ---------- estado ----------
    const state = {
      tab: "nova",
      step: "capture",
      photoPreview: null,
      items: [],
      loja: "",
      dataCompra: "",
      errorMsg: "",
      notas: [],
      aliases: {},
      estoque: [],
      produtoQuery: "",
      produtoAberto: null,
      selectMode: false,
      selecionados: [],
      mergeModalOpen: false,
      mergeNomeInput: "",
      showEstoqueForm: false,
      editandoEstoqueId: null,
      fotoStatus: "idle",
      estoqueForm: emptyEstoqueForm(),
      signedUrls: {},
    };

    function emptyEstoqueForm() {
      return { nome: "", categoria: "Ingrediente", quantidade: "", unidade: "un", precoUnitario: "", precoVenda: "", status: "girando", obs: "", fotoPath: null, fotoPreviewLocal: null };
    }

    // ---------- helpers ----------
    function brl(n) {
      const v = Number(n) || 0;
      return v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }
    function todayLabel() {
      return new Date().toLocaleDateString("pt-BR", { day: "2-digit", month: "short", year: "numeric" });
    }
    function normalize(str) {
      return (str || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim().replace(/\s+/g, " ");
    }
    function esc(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    function toast(msg) {
      const el = document.createElement("div");
      el.className = "toast";
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2600);
    }
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = () => reject(new Error("Falha ao ler a imagem"));
        reader.readAsDataURL(file);
      });
    }
    function resizeImageToBlob(file, maxWidth = 900, quality = 0.75) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const scale = Math.min(1, maxWidth / img.width);
          const canvas = document.createElement("canvas");
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          canvas.toBlob((blob) => resolve(blob), "image/jpeg", quality);
        };
        img.onerror = reject;
        img.src = url;
      });
    }
    // Comprime a foto da nota antes de enviar pro servidor — fotos de celular
    // vêm com vários MB e o servidor recusa (413) requisições grandes demais.
    // Mantém resolução maior que a do estoque pra não perder legibilidade do texto.
    function resizeImageToBase64(file, maxWidth = 1600, quality = 0.82) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const scale = Math.min(1, maxWidth / img.width);
          const canvas = document.createElement("canvas");
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          const dataUrl = canvas.toDataURL("image/jpeg", quality);
          resolve(dataUrl.split(",")[1]);
        };
        img.onerror = reject;
        img.src = url;
      });
    }

    // ---------- supabase: dados ----------
    async function carregarTudo() {
      const [{ data: notasData, error: e1 }, { data: itensData, error: e2 }, { data: aliasesData, error: e3 }, { data: estoqueData, error: e4 }] = await Promise.all([
        sb.from("notas").select("*").order("criado_em", { ascending: false }),
        sb.from("itens_nota").select("*"),
        sb.from("produto_aliases").select("*"),
        sb.from("estoque").select("*").order("criado_em", { ascending: false }),
      ]);
      if (e1 || e2 || e3 || e4) {
        console.error(e1, e2, e3, e4);
        toast("Erro ao carregar dados do banco");
        return;
      }
      const itensPorNota = {};
      for (const it of itensData) {
        if (!itensPorNota[it.nota_id]) itensPorNota[it.nota_id] = [];
        itensPorNota[it.nota_id].push(it);
      }
      state.notas = notasData.map((n) => ({ ...n, items: itensPorNota[n.id] || [] }));
      state.aliases = {};
      for (const a of aliasesData) state.aliases[a.variant_key] = a.nome_canonico;
      state.estoque = estoqueData;
      await carregarUrlsAssinadas();
      render();
    }

    async function carregarUrlsAssinadas() {
      const paths = state.estoque.map((e) => e.foto_url).filter(Boolean);
      for (const path of paths) {
        if (state.signedUrls[path]) continue;
        const { data } = await sb.storage.from(BUCKET).createSignedUrl(path, 60 * 60 * 24);
        if (data) state.signedUrls[path] = data.signedUrl;
      }
    }

    // ---------- captura de nota ----------
    async function handleFile(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      state.errorMsg = "";
      state.photoPreview = URL.createObjectURL(file);
      state.step = "processing";
      render();
      try {
        let base64, mediaType;
        try {
          base64 = await resizeImageToBase64(file);
          mediaType = "image/jpeg";
        } catch (resizeErr) {
          console.error("Falha ao comprimir, enviando original", resizeErr);
          base64 = await fileToBase64(file);
          mediaType = file.type || "image/jpeg";
        }
        const resp = await fetch("/api/extract-recibo", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ base64, mediaType }),
        });
        const rawText = await resp.text();
        let result;
        try {
          result = JSON.parse(rawText);
        } catch {
          throw new Error(`Servidor respondeu algo inesperado (status ${resp.status}): ${rawText.slice(0, 120)}`);
        }
        if (!resp.ok) throw new Error(result.error || "Falha ao ler a nota");

        const parsedItems = (result.items || []).map((it, idx) => ({
          id: `${Date.now()}-${idx}`,
          nome: it.nome || "",
          quantidade: it.quantidade ?? 1,
          precoUnitario: it.precoUnitario ?? 0,
          precoTotal: it.precoTotal ?? (it.precoUnitario ?? 0) * (it.quantidade ?? 1),
          incluir: true,
        }));
        if (parsedItems.length === 0) {
          state.errorMsg = "Não consegui identificar itens nessa foto. Tenta uma foto mais nítida e bem iluminada.";
          state.step = "error";
          render();
          return;
        }
        state.items = parsedItems;
        state.loja = result.loja || "";
        state.dataCompra = result.data || todayLabel();
        state.step = "review";
        render();
      } catch (err) {
        console.error(err);
        state.errorMsg = "Não consegui ler essa nota: " + (err && err.message ? err.message : "erro desconhecido") + " — tenta tirar a foto de novo, bem enquadrada e sem reflexo.";
        state.step = "error";
        render();
      }
    }

    function updateItemField(id, field, value) {
      const it = state.items.find((i) => i.id === id);
      if (!it) return;
      it[field] = field === "nome" ? value : Number(value);
      if (field === "quantidade" || field === "precoUnitario") {
        it.precoTotal = (Number(it.quantidade) || 0) * (Number(it.precoUnitario) || 0);
      }
      renderReviewTotalsOnly();
    }
    function toggleItem(id) {
      const it = state.items.find((i) => i.id === id);
      if (it) it.incluir = !it.incluir;
      render();
    }
    function renderReviewTotalsOnly() {
      // atualiza só os totais sem re-renderizar tudo (evita perder o foco do input)
      for (const it of state.items) {
        const totalEl = document.querySelector(`[data-total-de="${it.id}"]`);
        if (totalEl) totalEl.textContent = brl(it.precoTotal);
      }
      const totalGeralEl = document.querySelector("[data-total-geral]");
      if (totalGeralEl) {
        const total = state.items.filter((i) => i.incluir).reduce((s, i) => s + (Number(i.precoTotal) || 0), 0);
        totalGeralEl.textContent = brl(total);
      }
    }

    async function confirmSave() {
      const selected = state.items.filter((it) => it.incluir && it.nome.trim());
      if (selected.length === 0) return;
      const notaId = `nota-${Date.now()}`;
      const total = selected.reduce((s, it) => s + (Number(it.precoTotal) || 0), 0);
      const { error: e1 } = await sb.from("notas").insert({ id: notaId, loja: state.loja || "Mercado", data_compra: state.dataCompra || todayLabel(), total });
      if (e1) { console.error(e1); toast("Erro ao salvar a nota"); return; }
      const itensParaInserir = selected.map((it) => ({ nota_id: notaId, nome: it.nome, quantidade: it.quantidade, preco_unitario: it.precoUnitario, preco_total: it.precoTotal }));
      const { error: e2 } = await sb.from("itens_nota").insert(itensParaInserir);
      if (e2) { console.error(e2); toast("Erro ao salvar os itens"); return; }
      resetCapture();
      state.tab = "notas";
      await carregarTudo();
      toast("Nota cadastrada!");
    }

    function resetCapture() {
      state.step = "capture";
      state.photoPreview = null;
      state.items = [];
      state.loja = "";
      state.dataCompra = "";
      state.errorMsg = "";
    }

    async function deleteNota(id) {
      const { error } = await sb.from("notas").delete().eq("id", id);
      if (error) { console.error(error); toast("Erro ao remover"); return; }
      await carregarTudo();
    }

    // ---------- produtos agrupados ----------
    function timestampFromNotaId(id) {
      const n = Number((id || "").replace("nota-", ""));
      return isNaN(n) ? 0 : n;
    }

    function produtosAgrupados() {
      const map = new Map();
      for (const nota of state.notas) {
        const ts = timestampFromNotaId(nota.id);
        for (const it of nota.items) {
          const variantKey = normalize(it.nome);
          if (!variantKey) continue;
          const canonicalNome = state.aliases[variantKey] || it.nome;
          const groupKey = normalize(canonicalNome);
          if (!map.has(groupKey)) map.set(groupKey, { nome: canonicalNome, ocorrencias: [], variantes: new Map() });
          const grupo = map.get(groupKey);
          grupo.ocorrencias.push({ loja: nota.loja, data: nota.data_compra, ts, precoUnitario: Number(it.preco_unitario) || 0 });
          grupo.variantes.set(variantKey, it.nome);
        }
      }
      const list = Array.from(map.entries()).map(([groupKey, p]) => {
        const precos = p.ocorrencias.map((o) => o.precoUnitario).filter((n) => n > 0);
        const ultima = [...p.ocorrencias].sort((a, b) => b.ts - a.ts)[0];
        return {
          groupKey,
          nome: p.nome,
          ocorrencias: [...p.ocorrencias].sort((a, b) => b.ts - a.ts),
          variantes: Array.from(p.variantes.entries()).map(([k, nome]) => ({ key: k, nome })),
          min: precos.length ? Math.min(...precos) : 0,
          max: precos.length ? Math.max(...precos) : 0,
          ultimoPreco: ultima ? ultima.precoUnitario : 0,
          compras: p.ocorrencias.length,
        };
      });
      const q = normalize(state.produtoQuery);
      const filtered = q ? list.filter((p) => normalize(p.nome).includes(q)) : list;
      return filtered.sort((a, b) => a.nome.localeCompare(b.nome, "pt-BR"));
    }

    function toggleSelecionado(groupKey) {
      const i = state.selecionados.indexOf(groupKey);
      if (i >= 0) state.selecionados.splice(i, 1); else state.selecionados.push(groupKey);
      render();
    }
    function abrirModalUniao() {
      const produtos = produtosAgrupados().filter((p) => state.selecionados.includes(p.groupKey));
      state.mergeNomeInput = produtos[0] ? produtos[0].nome : "";
      state.mergeModalOpen = true;
      render();
    }
    async function confirmarUniao() {
      const finalNome = state.mergeNomeInput.trim();
      if (!finalNome) return;
      const produtos = produtosAgrupados().filter((p) => state.selecionados.includes(p.groupKey));
      const rows = [];
      for (const p of produtos) {
        for (const v of p.variantes) rows.push({ variant_key: v.key, nome_canonico: finalNome });
      }
      const { error } = await sb.from("produto_aliases").upsert(rows);
      if (error) { console.error(error); toast("Erro ao unir produtos"); return; }
      state.selecionados = [];
      state.selectMode = false;
      state.mergeModalOpen = false;
      await carregarTudo();
    }
    async function removerVariante(variantKey) {
      const { error } = await sb.from("produto_aliases").delete().eq("variant_key", variantKey);
      if (error) { console.error(error); toast("Erro ao desfazer"); return; }
      await carregarTudo();
    }

    // ---------- estoque ----------
    async function handleEstoqueFile(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      state.fotoStatus = "loading";
      render();
      try {
        let blob;
        try {
          blob = await resizeImageToBlob(file);
        } catch {
          blob = file;
        }
        const path = `estoque/${Date.now()}-${Math.random().toString(36).slice(2)}.jpg`;
        const { error } = await sb.storage.from(BUCKET).upload(path, blob, { contentType: "image/jpeg" });
        if (error) throw error;
        state.estoqueForm.fotoPath = path;
        const { data: signed } = await sb.storage.from(BUCKET).createSignedUrl(path, 60 * 60 * 24);
        state.estoqueForm.fotoPreviewLocal = signed ? signed.signedUrl : null;
        state.fotoStatus = "idle";
        render();
      } catch (err) {
        console.error(err);
        state.fotoStatus = "error";
        render();
      }
    }

    function sugestaoPrecoEstoque() {
      const key = normalize(state.estoqueForm.nome);
      if (!key || key.length < 3) return null;
      const match = produtosAgrupados().find((p) => normalize(p.nome) === key || p.variantes.some((v) => v.key === key));
      return match && match.ultimoPreco > 0 ? match : null;
    }

    async function salvarEstoque() {
      const f = state.estoqueForm;
      if (!f.nome.trim()) return;
      const payload = {
        nome: f.nome, categoria: f.categoria, quantidade: f.quantidade || null, unidade: f.unidade,
        preco_unitario: f.precoUnitario || null, preco_venda: f.precoVenda || null, status: f.status, obs: f.obs, foto_url: f.fotoPath,
      };
      let error;
      if (state.editandoEstoqueId) {
        ({ error } = await sb.from("estoque").update(payload).eq("id", state.editandoEstoqueId));
      } else {
        payload.id = `estoque-${Date.now()}`;
        ({ error } = await sb.from("estoque").insert(payload));
      }
      if (error) { console.error(error); toast("Erro ao salvar item"); return; }
      fecharFormularioEstoque();
      await carregarTudo();
      toast("Item salvo!");
    }

    function abrirEdicaoEstoque(item) {
      state.editandoEstoqueId = item.id;
      state.estoqueForm = {
        nome: item.nome, categoria: item.categoria, quantidade: item.quantidade ?? "", unidade: item.unidade || "un",
        precoUnitario: item.preco_unitario ?? "", precoVenda: item.preco_venda ?? "", status: item.status, obs: item.obs || "",
        fotoPath: item.foto_url || null, fotoPreviewLocal: item.foto_url ? state.signedUrls[item.foto_url] : null,
      };
      state.showEstoqueForm = true;
      render();
    }
    function fecharFormularioEstoque() {
      state.estoqueForm = emptyEstoqueForm();
      state.showEstoqueForm = false;
      state.editandoEstoqueId = null;
      state.fotoStatus = "idle";
      render();
    }
    async function deleteEstoque(id) {
      const { error } = await sb.from("estoque").delete().eq("id", id);
      if (error) { console.error(error); toast("Erro ao remover"); return; }
      await carregarTudo();
    }
    async function toggleEstoqueStatus(id) {
      const item = state.estoque.find((e) => e.id === id);
      if (!item) return;
      const novo = item.status === "girando" ? "parado" : "girando";
      const { error } = await sb.from("estoque").update({ status: novo }).eq("id", id);
      if (error) { console.error(error); return; }
      await carregarTudo();
    }

    // ---------- backup ----------
    function exportarBackup() {
      const backup = { exportadoEm: new Date().toISOString(), notas: state.notas, produtoAliases: state.aliases, estoque: state.estoque };
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `backup-confeitos-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ---------- render ----------
    function render() {
      const root = document.getElementById("root");
      root.innerHTML = `
        <div class="header">
          <div class="header-row">
            <div>
              <h1>Insumos por foto</h1>
              <p>fotografe, compare preços e organize o estoque</p>
            </div>
            <button class="btn-backup" onclick="app.exportarBackup()">⬇ backup</button>
          </div>
        </div>
        <div class="content">${renderTabContent()}</div>
        ${state.mergeModalOpen ? renderMergeModal() : ""}
        <div class="tabbar">
          <button class="${state.tab === "nova" ? "active" : ""}" onclick="app.setTab('nova')">📸<br>Nova nota</button>
          <button class="${state.tab === "notas" ? "active" : ""}" onclick="app.setTab('notas')">🧾<br>Notas</button>
          <button class="${state.tab === "produtos" ? "active" : ""}" onclick="app.setTab('produtos')">📊<br>Produtos</button>
          <button class="${state.tab === "estoque" ? "active" : ""}" onclick="app.setTab('estoque')">📦<br>Estoque</button>
        </div>
      `;
    }

    function renderTabContent() {
      if (state.tab === "nova") return renderNova();
      if (state.tab === "notas") return renderNotas();
      if (state.tab === "produtos") return renderProdutos();
      if (state.tab === "estoque") return renderEstoque();
      return "";
    }

    function renderNova() {
      if (state.step === "capture") {
        return `
          <label class="capture-zone">
            <span class="icon">📸</span>
            <h3>Tirar foto da nota</h3>
            <p>Boa luz e a nota bem esticada ajudam bastante</p>
            <input type="file" accept="image/*" capture="environment" onchange="app.handleFile(event)" style="display:none" />
          </label>`;
      }
      if (state.step === "processing") {
        return `
          <div class="processing">
            ${state.photoPreview ? `<img src="${state.photoPreview}" class="preview-thumb" />` : ""}
            <div class="spinner"></div>
            <p>Lendo os itens da nota...</p>
          </div>`;
      }
      if (state.step === "error") {
        return `
          <div>
            ${state.photoPreview ? `<img src="${state.photoPreview}" class="preview-thumb" />` : ""}
            <div class="error-box">${esc(state.errorMsg)}</div>
            <button class="btn btn-primary" onclick="app.resetCaptureUI()">Tentar de novo</button>
          </div>`;
      }
      if (state.step === "review") {
        const totalGeral = state.items.filter((i) => i.incluir).reduce((s, i) => s + (Number(i.precoTotal) || 0), 0);
        return `
          <div>
            <div class="receipt">
              <div class="receipt-edge"></div>
              <div class="receipt-inner">
                <div class="receipt-meta">
                  <input value="${esc(state.loja)}" oninput="app.setLoja(this.value)" placeholder="Nome do mercado" />
                  <span class="date">${esc(state.dataCompra)}</span>
                </div>
                ${state.items.map((it) => `
                  <div class="item-row ${it.incluir ? "" : "excluded"}">
                    <input type="checkbox" ${it.incluir ? "checked" : ""} onchange="app.toggleItem('${it.id}')" />
                    <div class="item-fields">
                      <input class="item-name" value="${esc(it.nome)}" oninput="app.updateItemField('${it.id}','nome',this.value)" />
                      <div class="item-numbers">
                        <input type="number" step="any" value="${it.quantidade}" oninput="app.updateItemField('${it.id}','quantidade',this.value)" />
                        <span class="x">×</span>
                        <input type="number" step="any" value="${it.precoUnitario}" oninput="app.updateItemField('${it.id}','precoUnitario',this.value)" />
                        <span class="total" data-total-de="${it.id}">${brl(it.precoTotal)}</span>
                      </div>
                    </div>
                  </div>`).join("")}
                <div class="receipt-total">
                  <span>Total</span>
                  <span data-total-geral>${brl(totalGeral)}</span>
                </div>
              </div>
              <div class="receipt-edge" style="transform:scaleY(-1)"></div>
            </div>
            <div class="scissors-note">✂ confira os itens antes de salvar</div>
            <div class="action-row">
              <button class="btn btn-ghost" onclick="app.resetCaptureUI()">Descartar</button>
              <button class="btn btn-primary" onclick="app.confirmSave()">Adicionar aos insumos</button>
            </div>
          </div>`;
      }
      return "";
    }

    function renderNotas() {
      if (state.notas.length === 0) {
        return `<div class="empty-state"><span class="icon">🧾</span><p>Nenhuma nota cadastrada ainda.<br>Fotografe uma na aba "Nova nota".</p></div>`;
      }
      const totalGeral = state.notas.reduce((s, n) => s + (Number(n.total) || 0), 0);
      return `
        <div class="summary-bar"><span class="label">gasto total registrado</span><span class="value">${brl(totalGeral)}</span></div>
        ${state.notas.map((nota) => `
          <div class="nota-card">
            <div class="nota-card-head"><span class="loja">${esc(nota.loja)}</span><span class="data">${esc(nota.data_compra)}</span></div>
            <div class="nota-items">
              ${nota.items.map((it) => `<div class="line"><span>${esc(it.nome)} (${it.quantidade}×)</span><span class="price">${brl(it.preco_total)}</span></div>`).join("")}
            </div>
            <div class="nota-card-foot">
              <span class="nota-total">${brl(nota.total)}</span>
              <button class="btn-danger-text" onclick="app.deleteNota('${nota.id}')">remover</button>
            </div>
          </div>`).join("")}
      `;
    }

    function renderProdutos() {
      const produtos = produtosAgrupados();
      let html = `<input class="search-box" placeholder="Buscar produto..." value="${esc(state.produtoQuery)}" oninput="app.setProdutoQuery(this.value)" />`;

      if (produtos.length > 1) {
        html += `<div class="merge-toolbar">`;
        if (!state.selectMode) {
          html += `<button class="btn-link" onclick="app.setSelectMode(true)">unir produtos iguais</button>`;
        } else {
          html += `<span class="merge-hint">${state.selecionados.length === 0 ? "toque nos produtos que são o mesmo item" : state.selecionados.length + " selecionado" + (state.selecionados.length > 1 ? "s" : "")}</span>`;
          html += `<div style="display:flex;gap:8px">
            <button class="btn-link" onclick="app.cancelarSelecao()">cancelar</button>
            ${state.selecionados.length >= 2 ? `<button class="btn-link strong" onclick="app.abrirModalUniao()">unir</button>` : ""}
          </div>`;
        }
        html += `</div>`;
      }

      if (produtos.length === 0) {
        html += `<div class="empty-state"><span class="icon">📊</span><p>Assim que você cadastrar notas, os produtos repetidos aparecem aqui agrupados, com o histórico de preço de cada compra.</p></div>`;
      } else {
        for (const p of produtos) {
          const aberto = state.produtoAberto === p.groupKey;
          const variacao = p.max > 0 ? ((p.max - p.min) / p.min) * 100 : 0;
          const selecionado = state.selecionados.includes(p.groupKey);
          html += `
            <div class="produto-card ${state.selectMode ? "selecionavel" : ""} ${selecionado ? "selecionado" : ""}"
                 onclick="${state.selectMode ? `app.toggleSelecionado('${p.groupKey}')` : `app.toggleProdutoAberto('${p.groupKey}')`}">
              <div class="produto-head">
                ${state.selectMode ? `<input type="checkbox" class="produto-checkbox" ${selecionado ? "checked" : ""} readonly />` : ""}
                <div style="flex:1">
                  <div class="produto-nome">${esc(p.nome)}</div>
                  <div class="produto-meta">${p.compras} compra${p.compras > 1 ? "s" : ""} registrada${p.compras > 1 ? "s" : ""}${p.variantes.length > 1 ? ` · ${p.variantes.length} nomes unidos` : ""}</div>
                </div>
                ${!state.selectMode ? `
                  <div class="produto-precos">
                    <div class="ultimo">${brl(p.ultimoPreco)}</div>
                    ${p.compras > 1 ? `<div class="faixa ${variacao > 15 ? "alerta" : ""}">${brl(p.min)} – ${brl(p.max)}</div>` : ""}
                  </div>` : ""}
              </div>
              ${aberto && !state.selectMode ? `
                <div class="produto-ocorrencias">
                  ${p.ocorrencias.map((o) => `<div class="line"><span>${esc(o.loja)} · ${esc(o.data)}</span><span class="price">${brl(o.precoUnitario)}</span></div>`).join("")}
                  ${p.variantes.length > 1 ? `
                    <div class="variantes-chips">
                      ${p.variantes.map((v) => `<span class="chip">${esc(v.nome)}<button onclick="event.stopPropagation(); app.removerVariante('${v.key}')" title="desfazer união">×</button></span>`).join("")}
                    </div>` : ""}
                </div>` : ""}
            </div>`;
        }
      }
      return html;
    }

    function renderEstoque() {
      const paradosCount = state.estoque.filter((e) => e.status === "parado").length;
      const valorTotal = state.estoque.reduce((s, e) => s + (Number(e.preco_unitario) || 0) * (Number(e.quantidade) || 0), 0);
      let html = "";
      if (valorTotal > 0) html += `<div class="summary-bar"><span class="label">valor total em estoque</span><span class="value">${brl(valorTotal)}</span></div>`;
      html += `<div class="estoque-toolbar">
        <span style="font-size:12px;color:#9A8A78">${state.estoque.length} item${state.estoque.length !== 1 ? "s" : ""} cadastrado${state.estoque.length !== 1 ? "s" : ""}</span>
        ${paradosCount > 0 ? `<span class="alerta-parado">${paradosCount} parado${paradosCount > 1 ? "s" : ""} ⚠</span>` : ""}
      </div>`;

      if (state.showEstoqueForm) {
        const f = state.estoqueForm;
        const sugestao = sugestaoPrecoEstoque();
        html += `
          <div class="estoque-form">
            <h4 class="form-title">${state.editandoEstoqueId ? "Editar item" : "Novo item de estoque"}</h4>
            <div class="form-row">
              <label>Foto</label>
              <label class="photo-upload">
                ${state.fotoStatus === "loading" ? `<div class="photo-loading"><div class="spinner"></div>processando foto...</div>` :
                  f.fotoPreviewLocal ? `<img src="${f.fotoPreviewLocal}" />` : "toque para adicionar foto"}
                <input type="file" accept="image/*" capture="environment" onchange="app.handleEstoqueFile(event)" style="display:none" />
              </label>
              ${state.fotoStatus === "error" ? `<div class="foto-erro">Não consegui carregar essa foto. Tenta tirar uma nova foto na hora (em vez de escolher da galeria) ou usar outra imagem.</div>` : ""}
            </div>
            <div class="form-row">
              <label>Nome do produto</label>
              <input type="text" value="${esc(f.nome)}" oninput="app.setEstoqueField('nome', this.value)" placeholder="ex: Caixa para trufa 12un" />
              ${sugestao && !f.precoUnitario ? `<button type="button" class="sugestao-preco" onclick="app.usarSugestaoPreco(${sugestao.ultimoPreco})">já vi esse item por ${brl(sugestao.ultimoPreco)} numa nota — usar esse valor</button>` : ""}
            </div>
            <div class="form-row-split">
              <div class="form-row">
                <label>Categoria</label>
                <select onchange="app.setEstoqueField('categoria', this.value)">
                  ${CATEGORIAS.map((c) => `<option value="${c}" ${f.categoria === c ? "selected" : ""}>${c}</option>`).join("")}
                </select>
              </div>
              <div class="form-row">
                <label>Quantidade</label>
                <input type="number" step="any" value="${f.quantidade}" oninput="app.setEstoqueField('quantidade', this.value)" />
              </div>
            </div>
            <div class="form-row-split">
              <div class="form-row">
                <label>Preço pago (por unidade)</label>
                <input type="number" step="any" value="${f.precoUnitario}" oninput="app.setEstoqueField('precoUnitario', this.value)" placeholder="0,00" />
              </div>
              <div class="form-row">
                <label>Unidade</label>
                <input type="text" value="${esc(f.unidade)}" oninput="app.setEstoqueField('unidade', this.value)" placeholder="un, kg, cx..." />
              </div>
            </div>
            <div class="form-row">
              <label>Preço de venda (se for produto que você revende)</label>
              <input type="number" step="any" value="${f.precoVenda}" oninput="app.setEstoqueField('precoVenda', this.value)" placeholder="0,00" />
              ${f.precoUnitario > 0 && f.precoVenda > 0 ? `<div class="margem-preview">lucro: ${brl(f.precoVenda - f.precoUnitario)} por unidade · margem: ${(((f.precoVenda - f.precoUnitario) / f.precoVenda) * 100).toFixed(0)}%</div>` : ""}
            </div>
            <div class="form-row">
              <label>Situação</label>
              <div class="status-toggle">
                <button type="button" class="${f.status === "girando" ? "active-girando" : ""}" onclick="app.setEstoqueField('status','girando')">Girando bem</button>
                <button type="button" class="${f.status === "parado" ? "active-parado" : ""}" onclick="app.setEstoqueField('status','parado')">Parado</button>
              </div>
            </div>
            <div class="form-row">
              <label>Observação (opcional)</label>
              <textarea oninput="app.setEstoqueField('obs', this.value)">${esc(f.obs)}</textarea>
            </div>
            <div class="action-row">
              <button class="btn btn-ghost" onclick="app.fecharFormularioEstoque()">Cancelar</button>
              <button class="btn btn-primary" onclick="app.salvarEstoque()">${state.editandoEstoqueId ? "Salvar alterações" : "Salvar item"}</button>
            </div>
          </div>`;
      }

      if (state.estoque.length === 0 && !state.showEstoqueForm) {
        html += `<div class="empty-state"><span class="icon">📦</span><p>Nenhum item de estoque cadastrado.<br>Toque no + para adicionar o primeiro.</p></div>`;
      } else {
        html += `<div class="estoque-grid">`;
        for (const it of state.estoque) {
          const fotoUrl = it.foto_url ? state.signedUrls[it.foto_url] : null;
          html += `
            <div class="estoque-card">
              ${fotoUrl ? `<img src="${fotoUrl}" class="foto" />` : `<div class="foto-placeholder">📦</div>`}
              <div class="estoque-card-body">
                <div class="cat">${esc(it.categoria || "")}</div>
                <div class="nome">${esc(it.nome)}</div>
                <div class="qtd">${it.quantidade ?? "—"} ${esc(it.unidade || "")}</div>
                ${it.preco_unitario > 0 ? `<div class="preco-pago">${brl(it.preco_unitario)} / ${esc(it.unidade || "")}${it.quantidade > 1 ? `<span class="preco-pago-total"> · total ${brl(it.preco_unitario * it.quantidade)}</span>` : ""}</div>` : ""}
                ${it.preco_venda > 0 ? `<div class="preco-venda">vende por ${brl(it.preco_venda)}${it.preco_unitario > 0 ? `<span class="margem"> · ${(((it.preco_venda - it.preco_unitario) / it.preco_venda) * 100).toFixed(0)}% margem</span>` : ""}</div>` : ""}
                <span class="badge-status ${it.status === "girando" ? "badge-girando" : "badge-parado"}" onclick="app.toggleEstoqueStatus('${it.id}')">${it.status === "girando" ? "girando bem" : "precisa girar"}</span>
              </div>
              <div class="estoque-card-foot">
                <button class="btn-link-sm" onclick='app.abrirEdicaoEstoquePorId("${it.id}")'>editar</button>
                <button class="btn-danger-text" onclick="app.deleteEstoque('${it.id}')">remover</button>
              </div>
            </div>`;
        }
        html += `</div>`;
      }

      if (!state.showEstoqueForm) html += `<button class="fab" onclick="app.abrirNovoEstoque()">+</button>`;
      return html;
    }

    function renderMergeModal() {
      return `
        <div class="merge-modal-backdrop" onclick="app.fecharMergeModal()">
          <div class="merge-modal" onclick="event.stopPropagation()">
            <h4>Unir como qual nome?</h4>
            <input type="text" value="${esc(state.mergeNomeInput)}" oninput="app.setMergeNomeInput(this.value)" />
            <div class="action-row">
              <button class="btn btn-ghost" onclick="app.fecharMergeModal()">Cancelar</button>
              <button class="btn btn-primary" onclick="app.confirmarUniao()">Unir produtos</button>
            </div>
          </div>
        </div>`;
    }

    // ---------- ponte pra ações do HTML (onclick etc) ----------
    window.app = {
      handleFile,
      resetCaptureUI: () => { resetCapture(); render(); },
      setLoja: (v) => { state.loja = v; },
      updateItemField,
      toggleItem,
      confirmSave,
      deleteNota,
      setProdutoQuery: (v) => { state.produtoQuery = v; render(); },
      toggleProdutoAberto: (k) => { state.produtoAberto = state.produtoAberto === k ? null : k; render(); },
      setSelectMode: (v) => { state.selectMode = v; state.selecionados = []; render(); },
      cancelarSelecao: () => { state.selectMode = false; state.selecionados = []; render(); },
      toggleSelecionado,
      abrirModalUniao,
      fecharMergeModal: () => { state.mergeModalOpen = false; render(); },
      setMergeNomeInput: (v) => { state.mergeNomeInput = v; },
      confirmarUniao,
      removerVariante,
      handleEstoqueFile,
      setEstoqueField: (field, value) => { state.estoqueForm[field] = value; if (["categoria", "status"].includes(field)) render(); },
      usarSugestaoPreco: (preco) => { state.estoqueForm.precoUnitario = preco; render(); },
      salvarEstoque,
      abrirEdicaoEstoquePorId: (id) => { const item = state.estoque.find((e) => e.id === id); if (item) abrirEdicaoEstoque(item); },
      fecharFormularioEstoque,
      abrirNovoEstoque: () => { state.estoqueForm = emptyEstoqueForm(); state.editandoEstoqueId = null; state.showEstoqueForm = true; render(); },
      deleteEstoque,
      toggleEstoqueStatus,
      exportarBackup,
      setTab: (t) => { state.tab = t; if (t === "nova") resetCapture(); render(); },
    };

    render();
    carregarTudo();
  </script>
</body>
</html>
